x-arcane:
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/webp/drupal.webp
  urls:
    - https://www.drupal.org/
    - https://github.com/drupal/drupal

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: my_password
    restart: always

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    # env_file: .env.exemple
    environment:
      MYSQL_ROOT_PASSWORD: my_password
      MYSQL_DATABASE: my_database


  drupal:
    image: drupal:10-apache
    ports:
      - '8080:80'
    depends_on:
      - postgres
      - mysql
    volumes:
      - /var/www/html/modules
      - /var/www/html/profiles
      - /var/www/html/themes
      # this takes advantage of the feature in Docker that a new anonymous
      # volume (which is what we're creating here) will be initialized with the
      # existing content of the image at the same location
      - /var/www/html/sites
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drupal.rule=Host(`drupal.${DOMAIN:-apps.local}`)"
      - "traefik.http.routers.drupal.entrypoints=web"
      - "traefik.http.services.drupal.loadbalancer.server.port=80"
      - "com.getarcaneapp.arcane.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/webp/drupal.webp"

networks:
  traefik-public:
    external: true


