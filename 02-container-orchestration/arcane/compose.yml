# Arcane - Docker Dashboard and Manager
# https://getarcane.app/
# Secure setup with Docker Socket Proxy

services:
  # Docker Socket Proxy - Secure Docker API access
  # https://github.com/Tecnativa/docker-socket-proxy
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: arcane-docker-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOG_LEVEL=info
      # Required by Arcane Manager
      - EVENTS=1
      - PING=1
      - VERSION=1
      - CONTAINERS=1
      - EXEC=1
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=1
      # Security critical (disabled)
      - AUTH=0
      - SECRETS=0
      # Not needed for Arcane (disabled)
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - GRPC=0
      - NODES=0
      - PLUGINS=0
      - SERVICES=0
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=0
    networks:
      - arcane-internal
    # Security hardening
    read_only: true
    tmpfs:
      - /run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/version"]
      interval: 10s
      timeout: 3s
      retries: 3

  arcane:
    image: ghcr.io/getarcaneapp/manager:latest
    container_name: arcane
    ports:
      - "${ARCANE_PORT:-3552}:3552"
    volumes:
      - arcane-data:/app/data
      # Path to stack/projects directory
      - ${PROJECTS_DIR:-./projects}:/app/data/projects:z
      # Path to local templates directory
      - ${TEMPLATES_DIR:-./templates}:/app/data/templates:z
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    networks:
      - arcane-internal
      - traefik-public
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./arcane", "health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arcane.rule=Host(`arcane.${DOMAIN:-apps.local}`)"
      - "traefik.http.routers.arcane.entrypoints=web"
      - "traefik.http.services.arcane.loadbalancer.server.port=3552"

networks:
  arcane-internal:
    driver: bridge
    name: arcane-internal
    internal: true
  traefik-public:
    external: true

volumes:
  arcane-data:
    name: arcane-data
    driver: local
